server:
    port: 8080

spring:
    datasource:
        url: jdbc:mariadb://db:3306/trip_sentinel
        username: trip_sentinel_user
        password: trip_sentinel_pass
        driver-class-name: org.mariadb.jdbc.Driver
    jpa:
        open-in-view: false
        hibernate: 
            ddl-auto: validate
            
        properties:
            hibernate:
                format_sql: true
    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
      